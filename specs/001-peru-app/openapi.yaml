        descripcion:
          type: string
        poblacion:
          type: string
        festividad:
          type: string
        actividad_economica:
          type: string
        imagen:
          type: string
        fecha_creacion:
          type: string
          format: date-time

    ProvinciaJsonInput:
      type: object
      required:
        - departamento_id
        - nombre
      properties:
        departamento_id:
          type: integer
        nombre:
          type: string
        capital:
          type: string
        descripcion:
          type: string
        poblacion:
          type: string
        festividad:
          type: string
        actividad_economica:
          type: string
        imagen:
          type: string

    ProvinciaInput:
      allOf:
