openapi: 3.0.3
info:
  title: PERU APP API REST
  version: 1.0.0
  description: |
    Contrato de API REST para PERU APP, plataforma web turístico-educativa
    basada en Spec-Driven Development. Este contrato documenta los endpoints
    principales utilizados por el frontend React para comunicarse con el backend
    Node.js y Express, conectado a una base de datos SQL Server.

    La API permite autenticar usuarios, gestionar roles, consultar información
    territorial del Perú y administrar contenidos turísticos y gastronómicos.
servers:
  - url: http://localhost:5000/api
    description: Servidor local de desarrollo

tags:
  - name: Auth
    description: Registro, inicio y cierre lógico de sesión.
  - name: Users
    description: Gestión de usuarios del sistema.
  - name: Departamentos
    description: Consulta y administración de departamentos.
  - name: Provincias
    description: Consulta y administración de provincias.
  - name: Distritos
    description: Consulta y administración de distritos.
  - name: Ciudades
    description: Consulta y administración de ciudades.
  - name: LugaresTuristicos
    description: Consulta y administración de lugares turísticos por departamento.
  - name: ComidasTipicas
    description: Consulta y administración de comidas típicas por departamento.
  - name: LugaresTuristicosProvincias
    description: Lugares turísticos asociados a provincias.
  - name: ComidasTipicasProvincias
    description: Comidas típicas asociadas a provincias.
  - name: LugaresTuristicosDistritos
    description: Lugares turísticos asociados a distritos.
  - name: ComidasTipicasDistritos
    description: Comidas típicas asociadas a distritos.
  - name: LugaresTuristicosCiudades
    description: Lugares turísticos asociados a ciudades.
  - name: ComidasTipicasCiudades
    description: Comidas típicas asociadas a ciudades.

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrar usuario
      description: Registra un nuevo usuario con rol usuario.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: El correo ya existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesión
      description: Valida credenciales y devuelve token JWT con datos del usuario.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Inicio de sesión exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /users:
    get:
      tags:
        - Users
      summary: Listar usuarios
      description: Devuelve los usuarios registrados. Requiere rol administrador.
      operationId: getUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuarios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /departamentos:
    get:
      tags:
        - Departamentos
      summary: Listar departamentos
      description: Devuelve los departamentos registrados.
      operationId: getDepartamentos
      security:
