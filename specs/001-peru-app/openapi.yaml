components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    DepartamentoIdParam:
      name: departamentoId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProvinciaIdParam:
      name: provinciaId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    DistritoIdParam:
      name: distritoId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CiudadIdParam:
      name: ciudadId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    SearchQuery:
      name: q
      in: query
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 100
    DepartamentoQuery:
      name: departamento_id
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ProvinciaQuery:
      name: provincia_id
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DistritoQuery:
      name: distrito_id
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    BadRequest:
      description: Datos inválidos o solicitud mal formada.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token ausente, inválido, expirado o usuario inexistente.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Rol insuficiente para la operación.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Registro o relación no encontrada.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicado, último administrador o relación que impide eliminar.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Archivo mayor al límite permitido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Tipo, MIME o firma de imagen no permitida.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Límite de solicitudes excedido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Error interno sin exposición de detalles técnicos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ValidationDetail:
      type: object
      required:
      - field
      - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: El correo no tiene un formato válido
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          example: Datos inválidos
        code:
          type: string
          example: VALIDATION_ERROR
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationDetail'
    HealthResponse:
      type: object
      required:
      - status
      - service
      - database
      - timestamp
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
        service:
          type: string
          example: peru-app-api
        database:
          type: string
          enum:
          - connected
          - unavailable
        timestamp:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      required:
      - nombres
      - apellidos
      - fecha_nacimiento
      - email
      - password
      properties:
        nombres:
          type: string
          minLength: 2
          maxLength: 100
        apellidos:
          type: string
          minLength: 2
          maxLength: 100
        fecha_nacimiento:
          type: string
          format: date
        email:
          type: string
          format: email
          maxLength: 150
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 72
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    ProfileUpdateRequest:
      type: object
      required:
      - nombres
      - apellidos
      - fecha_nacimiento
      - email
      properties:
        nombres:
          type: string
          minLength: 2
          maxLength: 100
        apellidos:
          type: string
          minLength: 2
          maxLength: 100
        fecha_nacimiento:
          type: string
          format: date
        email:
          type: string
          format: email
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 6
          maxLength: 72
    UserAdminUpdateRequest:
      type: object
      required:
      - nombres
      - apellidos
      - fecha_nacimiento
      - email
      - rol
      properties:
        nombres:
          type: string
        apellidos:
          type: string
        fecha_nacimiento:
          type: string
          format: date
        email:
          type: string
          format: email
        rol:
          type: string
          enum:
          - usuario
          - admin
    User:
      type: object
      properties:
        id:
          type: integer
        nombres:
          type: string
        apellidos:
          type: string
        fecha_nacimiento:
          type: string
          format: date
        email:
          type: string
          format: email
        rol:
          type: string
          enum:
          - usuario
          - admin
        fecha_registro:
          type: string
          format: date-time
    AuthMessageResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    OperationResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        departamento:
          $ref: '#/components/schemas/Departamento'
        provincia:
          $ref: '#/components/schemas/Provincia'
        distrito:
          $ref: '#/components/schemas/Distrito'
        ciudad:
          $ref: '#/components/schemas/Ciudad'
        lugar:
          $ref: '#/components/schemas/ContenidoTuristicoSimple'
        comida:
          $ref: '#/components/schemas/ContenidoGastronomicoSimple'
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
