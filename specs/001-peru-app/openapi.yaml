components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador numérico del registro.
      schema:
        type: integer
        example: 1
    DepartamentoIdParam:
      name: departamentoId
      in: path
      required: true
      description: Identificador del departamento.
      schema:
        type: integer
        example: 1
    ProvinciaIdParam:
      name: provinciaId
      in: path
      required: true
      description: Identificador de la provincia.
      schema:
        type: integer
        example: 1
    DistritoIdParam:
      name: distritoId
      in: path
      required: true
      description: Identificador del distrito.
      schema:
        type: integer
        example: 1
    CiudadIdParam:
      name: ciudadId
      in: path
      required: true
      description: Identificador de la ciudad.
      schema:
        type: integer
        example: 1

  responses:
    BadRequest:
      description: Solicitud inválida o datos incompletos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token ausente, inválido o credenciales incorrectas.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: El usuario no tiene permisos suficientes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Registro no encontrado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Error interno del servidor.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Error al procesar la solicitud

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operación realizada correctamente

    AuthMessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Usuario registrado exitosamente
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required:
        - nombres
        - apellidos
        - fecha_nacimiento
        - email
        - password
      properties:
        nombres:
          type: string
          example: Erwin Brayam
        apellidos:
          type: string
          example: Inca Pauccara
        fecha_nacimiento:
          type: string
          format: date
          example: 2002-05-15
        email:
          type: string
          format: email
          example: usuario@correo.com
        password:
          type: string
          format: password
          example: '123456'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: usuario@correo.com
        password:
          type: string
          format: password
          example: '123456'

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Inicio de sesión exitoso
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombres:
          type: string
          example: Erwin Brayam
        apellidos:
          type: string
          example: Inca Pauccara
        fecha_nacimiento:
          type: string
          format: date
          example: 2002-05-15
        email:
          type: string
          format: email
          example: usuario@correo.com
        rol:
          type: string
          enum:
            - usuario
            - admin
          example: usuario
        fecha_creacion:
          type: string
          format: date-time
          example: 2026-01-10T10:30:00Z

    Departamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Ayacucho
        capital:
          type: string
          example: Huamanga
        region:
          type: string
          example: Sierra
        descripcion:
          type: string
          example: Departamento con gran riqueza histórica, cultural y turística.
        imagen:
          type: string
          example: /uploads/departamentos/ayacucho.jpg
        introduccion:
          type: string
          example: Ayacucho destaca por su historia, arquitectura colonial y tradiciones culturales.
        fecha_creacion:
          type: string
          format: date-time

    DepartamentoJsonInput:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
        capital:
          type: string
        region:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
        introduccion:
          type: string

    DepartamentoInput:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
        capital:
          type: string
        region:
          type: string
        descripcion:
          type: string
        introduccion:
          type: string
        imagen:
          type: string
          format: binary

    DepartamentoResponse:
      type: object
      properties:
        message:
          type: string
          example: Departamento procesado exitosamente
        departamento:
          $ref: '#/components/schemas/Departamento'

    Provincia:
      type: object
      properties:
        id:
          type: integer
          example: 1
        departamento_id:
          type: integer
          example: 1
        departamento_nombre:
