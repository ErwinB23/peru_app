openapi: 3.0.3
info:
  title: PERU APP API REST
  version: 2.0.0
  description: Contrato sincronizado con las 70 operaciones HTTP reales del backend al cierre SDD pre-despliegue.
    Todas las funciones de negocio, salvo registro e inicio de sesión, requieren JWT. GET /health es una excepción
    técnica pública.
servers:
- url: http://localhost:5000/api
  description: Desarrollo local
- url: https://YOUR-RENDER-SERVICE.onrender.com/api
  description: Producción; reemplazar al desplegar
tags:
- name: Health
  description: Estado técnico mínimo del servicio.
- name: Auth
  description: Registro, inicio de sesión y perfil autenticado.
- name: Users
  description: Administración de usuarios; requiere rol admin.
- name: Departamentos
  description: Consulta y administración de departamentos.
- name: Provincias
  description: Consulta y administración de provincias.
- name: Distritos
  description: Consulta y administración de distritos.
- name: Ciudades
  description: Consulta y administración de ciudades.
- name: LugaresTuristicos
  description: Lugares turísticos asociados a departamentos.
- name: ComidasTipicas
  description: Comidas típicas asociadas a departamentos.
- name: LugaresTuristicosProvincias
  description: Lugares turísticos asociados a provincias.
- name: ComidasTipicasProvincias
  description: Comidas típicas asociadas a provincias.
- name: LugaresTuristicosDistritos
  description: Lugares turísticos asociados a distritos.
- name: ComidasTipicasDistritos
  description: Comidas típicas asociadas a distritos.
- name: LugaresTuristicosCiudades
  description: Lugares turísticos asociados a ciudades.
- name: ComidasTipicasCiudades
  description: Comidas típicas asociadas a ciudades.
paths:
  /auth/login:
    post:
      tags:
      - Auth
      summary: Iniciar sesión
      operationId: post_api_auth_login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Inicio de sesión exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/profile:
    get:
      tags:
      - Auth
      summary: Obtener perfil autenticado
      operationId: get_api_auth_profile
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Consulta exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
